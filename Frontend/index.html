<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nexorithm — Master algorithms, one problem at a time. A production-grade LeetCode clone with real-time code execution." />
    <title>Nexorithm — Algorithmic Problem Solving</title>

    <!-- Tailwind CSS with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#680008",
              "inverse-on-surface": "#313030",
              "inverse-primary": "#875200",
              "on-tertiary-fixed-variant": "#930010",
              "on-secondary": "#003916",
              "primary-fixed-dim": "#ffb867",
              "surface-container-low": "#1c1b1b",
              "surface-tint": "#ffb867",
              "on-tertiary-fixed": "#410003",
              "on-secondary-container": "#003112",
              "tertiary-fixed": "#ffdad6",
              "on-primary-container": "#683e00",
              "surface-bright": "#393939",
              "secondary-container": "#13a650",
              "on-secondary-fixed-variant": "#005323",
              "on-surface-variant": "#d9c3ad",
              "surface-container-lowest": "#0e0e0e",
              "on-primary-fixed-variant": "#673d00",
              "primary-fixed": "#ffddba",
              "surface": "#131313",
              "surface-dim": "#131313",
              "on-surface": "#e5e2e1",
              "outline": "#a18d7a",
              "error": "#ffb4ab",
              "on-error-container": "#ffdad6",
              "primary-container": "#ffa116",
              "tertiary-container": "#ff9b92",
              "background": "#131313",
              "tertiary": "#ffc3be",
              "on-tertiary-container": "#940010",
              "secondary": "#5edf81",
              "primary": "#ffc78b",
              "surface-container": "#20201f",
              "secondary-fixed": "#7cfc9b",
              "error-container": "#93000a",
              "surface-container-high": "#2a2a2a",
              "secondary-fixed-dim": "#5edf81",
              "on-background": "#e5e2e1",
              "inverse-surface": "#e5e2e1",
              "on-secondary-fixed": "#00210a",
              "surface-container-highest": "#353535",
              "on-error": "#690005",
              "on-primary": "#482900",
              "outline-variant": "#544434",
              "on-primary-fixed": "#2b1700",
              "surface-variant": "#353535",
              "tertiary-fixed-dim": "#ffb3ac"
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              "2xl": "0.75rem",
              full: "9999px"
            },
            fontFamily: {
              headline: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
              label: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"]
            }
          }
        }
      }
    </script>

    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-size: 1.25rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
      }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #131313; }
      ::-webkit-scrollbar-thumb { background: #353535; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #544434; }
      /* Monaco editor parent needs height */
      .monaco-editor-container { height: 100%; }
      /* Remove Vite default styles */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body">
    <div id="root"></div>
    <!-- Google Identity Services (GIS) for Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
