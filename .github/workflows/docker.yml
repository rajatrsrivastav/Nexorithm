name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nexorithm-backend:latest ./Backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nexorithm-frontend:latest ./Frontend

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nexorithm-backend:latest

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nexorithm-frontend:latest